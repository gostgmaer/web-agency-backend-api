name: Gateway Service Pipeline

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  NEW_IMAGE: easydev-gateway:latest
  IMAGE_ARCHIVE: easydev-gateway-latest.tar.gz
  GHCR_PACKAGE: easydev-gateway

jobs:
  changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.filter.outputs.code }}
      dependencies_changed: ${{ steps.filter.outputs.dependencies }}
      docker_changed: ${{ steps.filter.outputs.docker }}
      vulnerability_required: ${{ steps.compute.outputs.vulnerability_required }}
      build_required: ${{ steps.compute.outputs.build_required }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - 'app.js'
              - 'server.js'
              - 'cluster.js'
              - 'config/**'
              - 'controllers/**'
              - 'middleware/**'
              - 'models/**'
              - 'routes/**'
              - 'services/**'
              - 'utils/**'
              - 'validation/**'
              - '*.js'
            dependencies:
              - 'package.json'
              - 'pnpm-lock.yaml'
            docker:
              - 'Dockerfile'
              - 'deploy/oracle-vm/compose*.yml'

      - name: Compute pipeline requirements
        id: compute
        shell: bash
        env:
          CODE_CHANGED: ${{ steps.filter.outputs.code }}
          DEPENDENCIES_CHANGED: ${{ steps.filter.outputs.dependencies }}
          DOCKER_CHANGED: ${{ steps.filter.outputs.docker }}
        run: |
          set -euo pipefail

          vulnerability_required=false
          build_required=false

          if [[ "${CODE_CHANGED}" == "true" || "${DEPENDENCIES_CHANGED}" == "true" ]]; then
            vulnerability_required=true
          fi

          if [[ "${CODE_CHANGED}" == "true" || "${DEPENDENCIES_CHANGED}" == "true" || "${DOCKER_CHANGED}" == "true" ]]; then
            build_required=true
          fi

          echo "vulnerability_required=${vulnerability_required}" >> "$GITHUB_OUTPUT"
          echo "build_required=${build_required}" >> "$GITHUB_OUTPUT"

  code-quality:
    name: code-quality
    if: needs.changes.outputs.code_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: JavaScript syntax check
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            node --check "$file"
          done < <(git ls-files '*.js')

  vulnerability:
    name: vulnerability
    if: (needs.changes.outputs.vulnerability_required == 'true' || github.event_name == 'workflow_dispatch') && (needs.code-quality.result == 'success' || needs.code-quality.result == 'skipped')
    runs-on: ubuntu-latest
    needs: [changes, code-quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency vulnerability scan
        run: pnpm audit --prod --audit-level=critical

      - name: Trivy filesystem scan (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          vuln-type: library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: '1'

  build:
    name: build
    if: (needs.changes.outputs.build_required == 'true' || github.event_name == 'workflow_dispatch') && (needs.vulnerability.result == 'success' || needs.vulnerability.result == 'skipped')
    runs-on: ubuntu-latest
    needs: [changes, vulnerability]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: false
          load: true
          tags: ${{ env.NEW_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image architecture
        run: |
          set -euo pipefail
          arch="$(docker image inspect "${NEW_IMAGE}" --format '{{.Architecture}}')"
          if [[ "$arch" != "arm64" ]]; then
            echo "Expected arm64 image, got: $arch"
            exit 1
          fi

      - name: Trivy image scan (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.NEW_IMAGE }}
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: '1'

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image tags to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GHCR_PACKAGE: ${{ env.GHCR_PACKAGE }}
        run: |
          set -euo pipefail

          owner_lower="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          package_lower="$(echo "${GHCR_PACKAGE}" | tr '[:upper:]' '[:lower:]')"
          ghcr_image="ghcr.io/${owner_lower}/${package_lower}"
          version_tag="build-${GITHUB_RUN_NUMBER}"

          docker tag "${NEW_IMAGE}" "${ghcr_image}:latest"
          docker tag "${NEW_IMAGE}" "${ghcr_image}:${version_tag}"

          docker push "${ghcr_image}:latest"
          docker push "${ghcr_image}:${version_tag}"

          echo "Published ${ghcr_image}:latest and ${ghcr_image}:${version_tag}"

      - name: Trigger infra deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          INFRA_DEPLOY_TOKEN: ${{ secrets.INFRA_DEPLOY_TOKEN }}
        run: |
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${INFRA_DEPLOY_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/gostgmaer/easydev-infra/dispatches \
            -d '{"event_type":"deploy-core","client_payload":{"service":"easydev-gateway"}}'
