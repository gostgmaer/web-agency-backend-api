name: Gateway Service Pipeline

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Manual run mode (deploy-only reuses the latest image already in GHCR)"
        required: true
        default: "build-and-deploy"
        type: choice
        options:
          - build-and-deploy
          - build-only
          - deploy-only

permissions:
  contents: write
  packages: write

env:
  NEW_IMAGE: easydev-gateway:latest
  GHCR_PACKAGE: easydev-gateway
  MANUAL_RUN_MODE: ${{ github.event.inputs.run_mode || 'build-and-deploy' }}

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Detect changes
  # ---------------------------------------------------------------------------
  changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.filter.outputs.code }}
      dependencies_changed: ${{ steps.filter.outputs.dependencies }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - 'app.js'
              - 'server.js'
              - 'cluster.js'
              - 'config/**'
              - 'controllers/**'
              - 'middleware/**'
              - 'models/**'
              - 'routes/**'
              - 'services/**'
              - 'utils/**'
              - 'validation/**'
              - '*.js'
            dependencies:
              - 'package.json'
              - 'pnpm-lock.yaml'

  # ---------------------------------------------------------------------------
  # Stage 2: Code quality + vulnerability (merged, runs only when code/deps changed)
  # ---------------------------------------------------------------------------
  quality-and-security:
    name: quality-and-security
    if: needs.changes.outputs.code_changed == 'true' || needs.changes.outputs.dependencies_changed == 'true' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode != 'deploy-only')
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # --- Code quality (only when source code changed) ---
      - name: JavaScript syntax check
        if: needs.changes.outputs.code_changed == 'true' || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            node --check "$file"
          done < <(git ls-files '*.js')

      # --- Vulnerability (runs whenever the job is triggered) ---
      - name: Dependency audit
        run: pnpm audit --prod --audit-level=critical

      - name: Trivy filesystem scan (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          vuln-type: library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: '1'

  # ---------------------------------------------------------------------------
  # Stage 3: Build and push (always runs; GHA cache keeps it fast when unchanged)
  # ---------------------------------------------------------------------------
  build-and-push:
    name: build-and-push
    runs-on: ubuntu-latest
    needs: [changes, quality-and-security]
    if: |
      always() &&
      needs.changes.result == 'success' &&
      (needs.quality-and-security.result == 'success' || needs.quality-and-security.result == 'skipped') &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode != 'deploy-only')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: false
          load: true
          tags: ${{ env.NEW_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image architecture
        run: |
          set -euo pipefail
          arch="$(docker image inspect "${NEW_IMAGE}" --format '{{.Architecture}}')"
          if [[ "$arch" != "arm64" ]]; then
            echo "Expected arm64 image, got: $arch"
            exit 1
          fi

      - name: Trivy image scan (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.NEW_IMAGE }}
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: '1'

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image tags to GHCR
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GHCR_PACKAGE: ${{ env.GHCR_PACKAGE }}
        run: |
          set -euo pipefail

          owner_lower="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          package_lower="$(echo "${GHCR_PACKAGE}" | tr '[:upper:]' '[:lower:]')"
          ghcr_image="ghcr.io/${owner_lower}/${package_lower}"

          branch_slug="$(echo "${GITHUB_REF#refs/heads/}" | tr '/' '-' | tr '[:upper:]' '[:lower:]')"
          version_tag="${branch_slug}-build-${GITHUB_RUN_NUMBER}"

          docker tag "${NEW_IMAGE}" "${ghcr_image}:${version_tag}"
          docker push "${ghcr_image}:${version_tag}"

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            docker tag "${NEW_IMAGE}" "${ghcr_image}:latest"
            docker push "${ghcr_image}:latest"
          fi

          echo "Published ${ghcr_image}:${version_tag}"

  # ---------------------------------------------------------------------------
  # Stage 4: Trigger infra deploy
  # Service CI owns build + image push (stages 1–3).
  # All deployment orchestration (env generation, compose up, health checks) is
  # owned by easydev-infra. Firing repository_dispatch keeps deploy logic and
  # env secrets in one place, preventing partial-env failures on the server.
  # ---------------------------------------------------------------------------
  trigger-infra-deploy:
    name: trigger-infra-deploy
    runs-on: ubuntu-latest
    needs: [changes, quality-and-security, build-and-push]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      needs.changes.result == 'success' &&
      needs.quality-and-security.result != 'failure' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode != 'build-only') &&
      (
        (github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode == 'deploy-only') ||
        needs.build-and-push.result == 'success'
      )
    steps:
      - name: Dispatch deploy-core to easydev-infra
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: 'easydev-infra',
              event_type: 'deploy-core',
              client_payload: {
                service: 'gateway',
                triggered_by: context.sha,
              },
            })
            core.info('Dispatched deploy-core to easydev-infra')

  # ---------------------------------------------------------------------------
  # Stage 5: Create GitHub release and git tag
  # ---------------------------------------------------------------------------
  release:
    name: release
    runs-on: ubuntu-latest
    needs: [build-and-push, trigger-infra-deploy]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      needs.build-and-push.result == 'success' &&
      needs.trigger-infra-deploy.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --tags --force

      - name: Calculate next version
        shell: bash
        run: |
          set -euo pipefail
          LAST_TAG="$(git tag --list 'v*' --sort=-v:refname | head -n 1)"
          if [[ -z "$LAST_TAG" ]]; then
            LAST_TAG="v0.0.0"
          fi
          VERSION="${LAST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          MAJOR="${MAJOR:-0}"
          MINOR="${MINOR:-0}"
          PATCH="${PATCH:-0}"
          NEXT_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "NEW_TAG=${NEXT_TAG}" >> "$GITHUB_ENV"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NEW_TAG }}
          name: ${{ env.NEW_TAG }}
          body: |
            **Commit:** `${{ github.sha }}`
            **Docker image:** `ghcr.io/${{ github.repository_owner }}/${{ env.GHCR_PACKAGE }}:main-build-${{ github.run_number }}`
          make_latest: true
