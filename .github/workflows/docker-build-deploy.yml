name: Gateway Service Pipeline

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

permissions:
  contents: write
  packages: write

env:
  NEW_IMAGE: easydev-gateway:latest
  IMAGE_ARCHIVE: easydev-gateway-latest.tar.gz
  GHCR_PACKAGE: easydev-gateway

jobs:
  changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.filter.outputs.code }}
      dependencies_changed: ${{ steps.filter.outputs.dependencies }}
      docker_changed: ${{ steps.filter.outputs.docker }}
      vulnerability_required: ${{ steps.compute.outputs.vulnerability_required }}
      build_required: ${{ steps.compute.outputs.build_required }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - 'app.js'
              - 'server.js'
              - 'cluster.js'
              - 'config/**'
              - 'controllers/**'
              - 'middleware/**'
              - 'models/**'
              - 'routes/**'
              - 'services/**'
              - 'utils/**'
              - 'validation/**'
              - '*.js'
            dependencies:
              - 'package.json'
              - 'pnpm-lock.yaml'
            docker:
              - 'Dockerfile'
              - 'deploy/oracle-vm/compose*.yml'

      - name: Compute pipeline requirements
        id: compute
        shell: bash
        env:
          CODE_CHANGED: ${{ steps.filter.outputs.code }}
          DEPENDENCIES_CHANGED: ${{ steps.filter.outputs.dependencies }}
          DOCKER_CHANGED: ${{ steps.filter.outputs.docker }}
        run: |
          set -euo pipefail

          vulnerability_required=false
          build_required=false

          if [[ "${CODE_CHANGED}" == "true" || "${DEPENDENCIES_CHANGED}" == "true" ]]; then
            vulnerability_required=true
          fi

          if [[ "${CODE_CHANGED}" == "true" || "${DEPENDENCIES_CHANGED}" == "true" || "${DOCKER_CHANGED}" == "true" ]]; then
            build_required=true
          fi

          echo "vulnerability_required=${vulnerability_required}" >> "$GITHUB_OUTPUT"
          echo "build_required=${build_required}" >> "$GITHUB_OUTPUT"

  code-quality:
    name: code-quality
    if: needs.changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: JavaScript syntax check
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            node --check "$file"
          done < <(git ls-files '*.js')

  vulnerability:
    name: vulnerability
    if: needs.changes.outputs.vulnerability_required == 'true' && (needs.code-quality.result == 'success' || needs.code-quality.result == 'skipped')
    runs-on: ubuntu-latest
    needs: [changes, code-quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency vulnerability scan
        run: pnpm audit --prod --audit-level=critical

      - name: Trivy filesystem scan (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          vuln-type: library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: '1'

  build:
    name: build
    if: needs.changes.outputs.build_required == 'true' && (needs.vulnerability.result == 'success' || needs.vulnerability.result == 'skipped')
    runs-on: ubuntu-latest
    needs: [changes, vulnerability]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: false
          load: true
          tags: ${{ env.NEW_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image architecture
        run: |
          set -euo pipefail
          arch="$(docker image inspect "${NEW_IMAGE}" --format '{{.Architecture}}')"
          if [[ "$arch" != "arm64" ]]; then
            echo "Expected arm64 image, got: $arch"
            exit 1
          fi

      - name: Trivy image scan (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.NEW_IMAGE }}
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: '1'

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image tags to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GHCR_PACKAGE: ${{ env.GHCR_PACKAGE }}
        run: |
          set -euo pipefail

          owner_lower="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          package_lower="$(echo "${GHCR_PACKAGE}" | tr '[:upper:]' '[:lower:]')"
          ghcr_image="ghcr.io/${owner_lower}/${package_lower}"
          version_tag="build-${GITHUB_RUN_NUMBER}"

          docker tag "${NEW_IMAGE}" "${ghcr_image}:latest"
          docker tag "${NEW_IMAGE}" "${ghcr_image}:${version_tag}"

          docker push "${ghcr_image}:latest"
          docker push "${ghcr_image}:${version_tag}"

          echo "Published ${ghcr_image}:latest and ${ghcr_image}:${version_tag}"

      - name: Archive Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker save "${NEW_IMAGE}" | gzip > "${IMAGE_ARCHIVE}"

      - name: Upload image archive
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: gateway-image-archive
          path: ${{ env.IMAGE_ARCHIVE }}
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-latest
    needs: [changes, build]
    environment: production
    steps:
      - name: Download image archive
        if: needs.changes.outputs.build_required == 'true'
        uses: actions/download-artifact@v4
        with:
          name: gateway-image-archive
          path: .

      - name: Copy image archive to Oracle VM
        if: needs.changes.outputs.build_required == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: ${{ env.IMAGE_ARCHIVE }}
          target: /tmp/

      - name: Deploy on Oracle VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          NEW_IMAGE: ${{ env.NEW_IMAGE }}
          IMAGE_ARCHIVE: ${{ env.IMAGE_ARCHIVE }}
          BUILD_REQUIRED: ${{ needs.changes.outputs.build_required }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: NEW_IMAGE,IMAGE_ARCHIVE,BUILD_REQUIRED
          script: |
            set -euo pipefail

            DEPLOY_DIR="/home/opc/easydev-backends/deploy/oracle-vm"
            APPS_ENV="${DEPLOY_DIR}/.env.apps"
            ARCHIVE_PATH="/tmp/${IMAGE_ARCHIVE}"
            BUILD_REQUIRED="${BUILD_REQUIRED:-true}"

            ensure_key() {
              local file="$1"
              local key="$2"
              local value="$3"
              if ! grep -q "^${key}=" "$file"; then
                printf '%s=%s\n' "$key" "$value" >> "$file"
              fi
            }

            set_with_backup() {
              local file="$1"
              local key="$2"
              local backup_key="$3"
              local new_value="$4"
              local old_value

              old_value="$(grep "^${key}=" "$file" | tail -n 1 | cut -d= -f2- || true)"
              if [[ -n "$old_value" && "$old_value" != "$new_value" ]]; then
                if grep -q "^${backup_key}=" "$file"; then
                  sed -i "s|^${backup_key}=.*|${backup_key}=${old_value}|" "$file"
                else
                  printf '%s=%s\n' "$backup_key" "$old_value" >> "$file"
                fi
              fi

              if grep -q "^${key}=" "$file"; then
                sed -i "s|^${key}=.*|${key}=${new_value}|" "$file"
              else
                printf '%s=%s\n' "$key" "$new_value" >> "$file"
              fi
            }

            wait_for_health() {
              local container_name="$1"
              local retries="${2:-50}"
              local sleep_seconds="${3:-5}"

              for ((i=1; i<=retries; i++)); do
                state="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_name" 2>/dev/null || true)"
                if [[ "$state" == "healthy" || "$state" == "running" ]]; then
                  echo "Healthy: $container_name ($state)"
                  return 0
                fi
                sleep "$sleep_seconds"
              done

              echo "Container did not become healthy in time: $container_name"
              docker logs --tail 120 "$container_name" || true
              return 1
            }

            if [[ "$BUILD_REQUIRED" == "true" ]]; then
              if [[ ! -f "$ARCHIVE_PATH" ]]; then
                echo "Missing image archive: $ARCHIVE_PATH"
                exit 1
              fi

              docker load -i "$ARCHIVE_PATH" >/dev/null
              rm -f "$ARCHIVE_PATH"
            else
              echo "No build-required changes detected; deploying using existing image reference."
            fi

            ensure_key "$APPS_ENV" "GATEWAY_IMAGE" "easydev-gateway:latest"
            ensure_key "$APPS_ENV" "GATEWAY_IMAGE_BACKUP" ""

            set_with_backup "$APPS_ENV" "GATEWAY_IMAGE" "GATEWAY_IMAGE_BACKUP" "$NEW_IMAGE"

            cd "$DEPLOY_DIR"
            docker compose --env-file .env.core --env-file .env.apps -f compose.apps.yml up -d --no-deps web-agency-backend
            wait_for_health easydev-iam-platform
            wait_for_health easydev-payment-service
            if ! wait_for_health easydev-communication-backend 12 5; then
              echo "Warning: easydev-communication-backend is not healthy; continuing gateway deploy because communication deploy is managed by a separate pipeline."
            fi
            wait_for_health easydev-web-agency-backend

            echo "Gateway deployed without restarting dependencies; required dependency health verified."

  package-retention:
    name: package-retention
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.build_required == 'true' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    needs: [changes, build]
    steps:
      - name: Keep only latest 5 GHCR versions
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_PACKAGE: ${{ env.GHCR_PACKAGE }}
        run: |
          set -euo pipefail

          owner="${GITHUB_REPOSITORY_OWNER}"
          owner_type="$(gh api "/users/${owner}" --jq '.type')"

          if [[ "$owner_type" == "Organization" ]]; then
            base_path="/orgs/${owner}/packages/container/${GHCR_PACKAGE}"
          else
            base_path="/users/${owner}/packages/container/${GHCR_PACKAGE}"
          fi

          mapfile -t delete_ids < <(
            gh api "${base_path}/versions?per_page=100" --jq 'sort_by(.created_at) | reverse | .[5:] | .[].id'
          )

          if [[ "${#delete_ids[@]}" -eq 0 ]]; then
            echo "No old package versions to delete for ${GHCR_PACKAGE}."
            exit 0
          fi

          for version_id in "${delete_ids[@]}"; do
            gh api --method DELETE "${base_path}/versions/${version_id}" >/dev/null
            echo "Deleted package version id=${version_id}"
          done

  cleanup:
    name: cleanup
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: deploy
    environment: production
    steps:
      - name: Cleanup old gateway images on Oracle VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail

            DEPLOY_DIR="/home/opc/easydev-backends/deploy/oracle-vm"
            APPS_ENV="${DEPLOY_DIR}/.env.apps"
            CONTAINER="easydev-web-agency-backend"
            BACKUP_REF="$(grep '^GATEWAY_IMAGE_BACKUP=' "$APPS_ENV" | tail -n 1 | cut -d= -f2- || true)"

            cleanup_repo_keep_current_and_backup() {
              local container_name="$1"
              local backup_ref="$2"
              local current_ref current_repo current_id backup_id

              current_ref="$(docker inspect --format '{{.Config.Image}}' "$container_name")"
              current_repo="${current_ref%:*}"
              current_id="$(docker inspect --format '{{.Image}}' "$container_name")"
              backup_id="$(docker image inspect --format '{{.Id}}' "$backup_ref" 2>/dev/null || true)"

              while IFS=' ' read -r image_ref image_id; do
                [[ -z "$image_ref" || -z "$image_id" ]] && continue
                if [[ "$image_id" == "$current_id" ]]; then
                  continue
                fi
                if [[ -n "$backup_id" && "$image_id" == "$backup_id" ]]; then
                  continue
                fi
                docker rmi "$image_ref" >/dev/null 2>&1 || true
              done < <(docker images "$current_repo" --format '{{.Repository}}:{{.Tag}} {{.ID}}' | sort -u)
            }

            if docker inspect "$CONTAINER" >/dev/null 2>&1; then
              cleanup_repo_keep_current_and_backup "$CONTAINER" "$BACKUP_REF"
            fi

            docker image prune -f >/dev/null 2>&1 || true

  tag:
    name: tag
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: cleanup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get next tag
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          LAST_TAG="$(git tag --list 'v*' --sort=-v:refname | head -n 1)"
          if [[ "$LAST_TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
          else
            MAJOR=0
            MINOR=0
            PATCH=0
          fi

          NEXT_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "NEW_TAG=$NEXT_TAG" >> "$GITHUB_ENV"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NEW_TAG }}
          name: Release ${{ env.NEW_TAG }}
          generate_release_notes: true
