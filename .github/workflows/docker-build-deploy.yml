name: Gateway Build And Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-transfer-deploy:
    runs-on: ubuntu-latest
    environment: production

    env:
      NEW_IMAGE: easydev-gateway:sha-${{ github.sha }}
      IMAGE_ARCHIVE: easydev-gateway-${{ github.sha }}.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ${{ env.NEW_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Archive Docker image
        run: docker save "${NEW_IMAGE}" | gzip > "${IMAGE_ARCHIVE}"

      - name: Copy image archive to Oracle VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: ${{ env.IMAGE_ARCHIVE }}
          target: /tmp/

      - name: Deploy on Oracle VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          NEW_IMAGE: ${{ env.NEW_IMAGE }}
          IMAGE_ARCHIVE: ${{ env.IMAGE_ARCHIVE }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: NEW_IMAGE,IMAGE_ARCHIVE
          script: |
            set -euo pipefail

            DEPLOY_DIR="/home/opc/easydev-backends/deploy/oracle-vm"
            CORE_ENV="${DEPLOY_DIR}/.env.core"
            APPS_ENV="${DEPLOY_DIR}/.env.apps"
            ARCHIVE_PATH="/tmp/${IMAGE_ARCHIVE}"

            ensure_key() {
              local file="$1"
              local key="$2"
              local value="$3"
              if ! grep -q "^${key}=" "$file"; then
                printf '%s=%s\n' "$key" "$value" >> "$file"
              fi
            }

            set_with_backup() {
              local file="$1"
              local key="$2"
              local backup_key="$3"
              local new_value="$4"
              local old_value

              old_value="$(grep "^${key}=" "$file" | tail -n 1 | cut -d= -f2- || true)"
              if [[ -n "$old_value" && "$old_value" != "$new_value" ]]; then
                if grep -q "^${backup_key}=" "$file"; then
                  sed -i "s|^${backup_key}=.*|${backup_key}=${old_value}|" "$file"
                else
                  printf '%s=%s\n' "$backup_key" "$old_value" >> "$file"
                fi
              fi

              if grep -q "^${key}=" "$file"; then
                sed -i "s|^${key}=.*|${key}=${new_value}|" "$file"
              else
                printf '%s=%s\n' "$key" "$new_value" >> "$file"
              fi
            }

            if [[ ! -f "$ARCHIVE_PATH" ]]; then
              echo "Missing image archive: $ARCHIVE_PATH"
              exit 1
            fi

            docker load -i "$ARCHIVE_PATH" >/dev/null
            rm -f "$ARCHIVE_PATH"

            ensure_key "$CORE_ENV" "IAM_IMAGE" "easydev-iam-service:latest"
            ensure_key "$CORE_ENV" "PAYMENT_IMAGE" "easydev-payment-service:latest"
            ensure_key "$APPS_ENV" "GATEWAY_IMAGE" "easydev-gateway:latest"
            ensure_key "$APPS_ENV" "COMMUNICATION_IMAGE" "easydev-ai-communication-backend:latest"
            ensure_key "$APPS_ENV" "IAM_PUBLIC_HOST" "iam-service.easydev.in"
            ensure_key "$APPS_ENV" "PAYMENT_PUBLIC_HOST" "payment.easydev.in"
            ensure_key "$APPS_ENV" "GATEWAY_PUBLIC_HOST" "gateway-server.easydev.in"

            set_with_backup "$APPS_ENV" "GATEWAY_IMAGE" "GATEWAY_IMAGE_BACKUP" "$NEW_IMAGE"

            cd "$DEPLOY_DIR"
            chmod +x deploy.sh check-health.sh
            SKIP_PULL=true ./deploy.sh
