name: build-and-push-product-images

on:
  push:
    branches:
      - main
    paths:
      - ai-automation-communication-service/**
      - .github/workflows/build-and-push-product-images.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-product-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ai-automation-communication-service
        uses: docker/build-push-action@v6
        with:
          context: ./ai-automation-communication-service
          file: ./ai-automation-communication-service/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/ai-automation-communication-service:latest
            ghcr.io/${{ github.repository_owner }}/ai-automation-communication-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
