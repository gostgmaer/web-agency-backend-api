services:
  gateway:
    # Public entrypoint. This is the only service exposing host ports.
    image: ghcr.io/your-org/gateway:latest
    container_name: gateway
    restart: unless-stopped
    env_file:
      - /home/opc/easydev/env/.env.shared
      - /home/opc/easydev/env/.env.gateway
    ports:
      - "${GATEWAY_PUBLIC_PORT:-80}:3000"
    depends_on:
      auth-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - easydev-net
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  auth-service:
    # Internal-only auth platform service.
    image: ghcr.io/your-org/auth-service:latest
    container_name: auth-service
    restart: unless-stopped
    env_file:
      - /home/opc/easydev/env/.env.shared
      - /home/opc/easydev/env/.env.auth
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - easydev-net
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  payment-service:
    # Internal-only payment platform service.
    image: ghcr.io/your-org/payment-service:latest
    container_name: payment-service
    restart: unless-stopped
    env_file:
      - /home/opc/easydev/env/.env.shared
      - /home/opc/easydev/env/.env.payment
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - easydev-net
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    # Shared data plane for core + product services.
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    env_file:
      - /home/opc/easydev/env/.env.shared
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - /home/opc/easydev/stacks/core/postgres-init:/docker-entrypoint-initdb.d:ro
    expose:
      - "5432"
    networks:
      - easydev-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    # Shared cache/queue plane for core + product services.
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    env_file:
      - /home/opc/easydev/env/.env.shared
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$REDIS_PASSWORD\""]
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    networks:
      - easydev-net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep PONG >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

networks:
  easydev-net:
    external: true
    name: easydev-net

volumes:
  # Explicit names ensure persistence across normal compose updates.
  postgres-data:
    name: easydev-postgres-data
  redis-data:
    name: easydev-redis-data
