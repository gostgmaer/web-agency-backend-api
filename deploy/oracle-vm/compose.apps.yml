name: easydev-apps

services:
  communication-backend:
    image: ${COMMUNICATION_IMAGE}
    pull_policy: never
    container_name: easydev-communication-backend
    restart: unless-stopped
    env_file:
      - .env.apps
    environment:
      NODE_ENV: production
      PORT: 3303
      DB_HOST: postgres-core
      DB_PORT: 3304
      DB_USERNAME: ${CORE_POSTGRES_USER}
      DB_PASSWORD: ${CORE_POSTGRES_PASSWORD}
      DB_NAME: ${CORE_POSTGRES_DB}
      DB_SCHEMA: ${COMM_DB_SCHEMA:-communication}
      DB_SYNCHRONIZE: "true"
      REDIS_HOST: redis-core
      REDIS_PORT: 3305
      IAM_SERVICE_URL: http://iam-platform:3301
      EASYDEV_API_URL: http://web-agency-backend:3300/api
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3303/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    mem_limit: 1536m
    cpus: "1.00"
    networks:
      - apps-internal
      - easydev-services

  web-agency-backend:
    image: ${GATEWAY_IMAGE}
    pull_policy: never
    container_name: easydev-web-agency-backend
    restart: unless-stopped
    env_file:
      - .env.apps
    environment:
      NODE_ENV: production
      PORT: 3300
      AUTH_SERVICE_URL: http://iam-platform:3301
      PAYMENT_SERVICE_URL: http://payment-service:3302
      COMMUNICATION_URL: http://communication-backend:3303/api/v1
      NOTIFICATION_SERVICE_HEALTH_URL: ${NOTIFICATION_SERVICE_HEALTH_URL:-https://notification.example.com/v1/health}
      FILE_UPLOAD_SERVICE_HEALTH_URL: ${FILE_UPLOAD_SERVICE_HEALTH_URL:-https://files.example.com/health}
    ports:
      - "3300:3300"
    depends_on:
      communication-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3300/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    mem_limit: 1536m
    cpus: "1.00"
    networks:
      - apps-internal
      - easydev-services

  edge-proxy:
    image: ${EDGE_PROXY_IMAGE:-caddy:2.9-alpine}
    container_name: easydev-edge-proxy
    restart: unless-stopped
    environment:
      GATEWAY_PUBLIC_HOST: ${GATEWAY_PUBLIC_HOST}
      IAM_PUBLIC_HOST: ${IAM_PUBLIC_HOST}
      PAYMENT_PUBLIC_HOST: ${PAYMENT_PUBLIC_HOST}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      web-agency-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    mem_limit: 384m
    cpus: "0.25"
    networks:
      - easydev-services

volumes:
  caddy-data:
  caddy-config:

networks:
  apps-internal:
    driver: bridge
  easydev-services:
    external: true
